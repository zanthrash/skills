<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Maps</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #21253a; --border: #2d3148;
    --text: #e2e8f0; --text-muted: #7c85a2; --text-dim: #4a5068;
    --accent: #6366f1; --accent-glow: rgba(99,102,241,0.15);
    --warning: #f59e0b; --success: #10b981;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --header-h: 60px;
    --search-h: 56px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }

  /* ── Skip link ──────────────────────────────────────────────────────────── */
  .skip-link { position: absolute; left: -9999px; top: 8px; padding: 6px 14px; background: var(--accent); color: #fff; border-radius: 6px; font-size: 12px; z-index: 9999; text-decoration: none; }
  .skip-link:focus { left: 8px; }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 0 24px;
  }
  #header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; }
  .header-meta { font-size: 11px; color: var(--text-muted); }
  .header-meta strong { color: var(--accent); font-weight: 600; }
  #last-updated { margin-left: auto; font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── Search bar ─────────────────────────────────────────────────────────── */
  #search-bar {
    position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 99;
    height: var(--search-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 10px;
  }
  #search-wrap { position: relative; flex: 1; max-width: 560px; }
  #search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  #search-input {
    width: 100%; height: 34px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0 32px 0 34px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search-input::placeholder { color: var(--text-dim); }
  #search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
  #search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 14px; line-height: 1; display: none; }
  #search-clear:hover { color: var(--text); }
  #search-clear:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .search-hint { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .search-hint kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  #match-count { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 80px; text-align: right; }

  /* ── Main content ───────────────────────────────────────────────────────── */
  #main {
    margin-top: calc(var(--header-h) + var(--search-h));
    padding: 24px 24px 48px;
    max-width: 1100px;
  }

  /* ── Empty / no-results state ───────────────────────────────────────────── */
  #empty-state { display: none; padding: 64px 24px; text-align: center; }
  #empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  #empty-state p { color: var(--text-muted); font-size: 13px; }
  #empty-state strong { color: var(--text); }

  /* ── Group sections ─────────────────────────────────────────────────────── */
  .group-section { margin-bottom: 8px; }
  .group-summary {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 7px;
    cursor: pointer; list-style: none; user-select: none;
    transition: background 0.12s;
  }
  .group-summary::-webkit-details-marker { display: none; }
  .group-summary:hover { background: var(--surface); }
  .group-summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .group-chevron { color: var(--text-dim); font-size: 10px; transition: transform 0.18s ease; flex-shrink: 0; }
  details[open] .group-chevron { transform: rotate(90deg); }
  .group-icon { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; font-family: var(--mono); flex-shrink: 0; }
  .group-icon.apps { background: rgba(16,185,129,0.12); color: #10b981; }
  .group-icon.libs { background: rgba(99,102,241,0.12); color: var(--accent); }
  .group-icon.other { background: rgba(124,133,162,0.12); color: var(--text-muted); }
  .group-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .group-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .group-body { padding: 4px 0 12px 12px; }

  /* ── Component cluster ──────────────────────────────────────────────────── */
  .component-cluster { margin-bottom: 4px; }
  .entry-row {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) minmax(0, 2fr) auto;
    align-items: center; gap: 12px;
    padding: 9px 12px; border-radius: 7px;
    border: 1px solid transparent;
    text-decoration: none; color: inherit;
    transition: background 0.12s, border-color 0.12s;
    cursor: pointer;
  }
  .entry-row:hover { background: var(--accent-glow); border-color: rgba(99,102,241,0.2); }
  .entry-row:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .entry-name { font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-path { font-size: 11px; font-family: var(--mono); color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { display: flex; align-items: center; gap: 8px; justify-content: flex-end; white-space: nowrap; }
  .entry-date { font-size: 11px; color: var(--text-dim); cursor: default; }

  /* version disclosure toggle row */
  .version-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px; cursor: pointer; user-select: none;
  }
  .version-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .version-badge {
    font-size: 10px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 7px;
    color: var(--text-muted);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .version-toggle:hover .version-badge { background: var(--accent-glow); border-color: rgba(99,102,241,0.3); color: var(--accent); }
  .version-label { font-size: 11px; color: var(--text-dim); }
  .version-chevron { font-size: 9px; color: var(--text-dim); transition: transform 0.15s; }

  .version-list { display: none; padding: 2px 0 4px 12px; }
  .version-list.open { display: block; }
  .version-list .entry-row { background: transparent; }
  .version-list .entry-row:hover { background: rgba(99,102,241,0.06); }
  .version-list .entry-name { font-size: 12px; color: var(--text-muted); font-weight: 400; }
  .version-badge-inline {
    font-size: 10px; background: rgba(99,102,241,0.1); color: var(--accent);
    border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-weight: 600;
    white-space: nowrap;
  }

  /* ── Search highlights ──────────────────────────────────────────────────── */
  mark { background: rgba(99,102,241,0.3); color: var(--text); border-radius: 2px; padding: 0 1px; }

  /* ── Legacy section ─────────────────────────────────────────────────────── */
  #legacy-section { margin-top: 32px; }
  .legacy-header {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer;
    border-radius: 7px; user-select: none; list-style: none;
  }
  .legacy-header::-webkit-details-marker { display: none; }
  .legacy-header:hover { background: rgba(245,158,11,0.06); }
  .legacy-header:focus-visible { outline: 2px solid var(--warning); outline-offset: 2px; }
  .legacy-icon { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; background: rgba(245,158,11,0.12); color: var(--warning); font-family: var(--mono); }
  .legacy-name { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .legacy-count { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .legacy-body { padding: 4px 0 12px 12px; }
  .legacy-row {
    display: grid; grid-template-columns: minmax(180px,1fr) auto;
    align-items: center; gap: 12px;
    padding: 7px 12px; border-radius: 6px;
    text-decoration: none; color: inherit;
    transition: background 0.12s;
  }
  .legacy-row:hover { background: rgba(245,158,11,0.06); }
  .legacy-row:focus-visible { outline: 2px solid var(--warning); outline-offset: 2px; }
  .legacy-row .entry-name { color: var(--text-muted); font-weight: 400; }
  .legacy-tip { font-size: 11px; color: var(--text-dim); padding: 4px 12px 12px; }

  /* ── Divider ────────────────────────────────────────────────────────────── */
  .section-divider { height: 1px; background: var(--border); margin: 4px 0 8px; opacity: 0.5; }

  /* ── Hidden by search ───────────────────────────────────────────────────── */
  .hidden { display: none !important; }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<header id="header" role="banner">
  <h1>Architecture Maps</h1>
  <span class="header-meta" id="map-count-label"></span>
  <span id="last-updated"></span>
</header>

<div id="search-bar" role="search">
  <div id="search-wrap">
    <svg id="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="search" placeholder="Search components, paths, issues…" aria-label="Search architecture maps" autocomplete="off" spellcheck="false">
    <button id="search-clear" aria-label="Clear search" title="Clear">×</button>
  </div>
  <span class="search-hint">Press <kbd>/</kbd> to focus</span>
  <span id="match-count" aria-live="polite" aria-atomic="true"></span>
</div>

<main id="main" tabindex="-1">
  <div id="groups-container"></div>
  <div id="empty-state" role="status">
    <div class="empty-icon">◎</div>
    <p>No maps match <strong id="empty-query"></strong></p>
    <p style="margin-top:6px;font-size:11px;">Try a component name, file path, or issue title</p>
  </div>
  <div id="legacy-container"></div>
</main>

<!-- Data injected by build_index.py -->
<script type="application/json" id="arch-map-entries">__ARCH_MAP_ENTRIES__</script>

<script>
(function () {
  // ── Load data ────────────────────────────────────────────────────────────
  const raw = JSON.parse(document.getElementById('arch-map-entries').textContent);
  const { entries = [], legacy = [], generatedAt = '' } = raw;

  // ── Header meta ──────────────────────────────────────────────────────────
  const totalMaps = entries.length;
  const totalComponents = new Set(entries.map(e => e.component + '::' + e.group)).size;
  document.getElementById('map-count-label').innerHTML =
    `<strong>${totalMaps}</strong> map${totalMaps !== 1 ? 's' : ''} &nbsp;·&nbsp; <strong>${totalComponents}</strong> component${totalComponents !== 1 ? 's' : ''}`;
  if (generatedAt) {
    document.getElementById('last-updated').textContent = 'Index updated ' + relativeTime(generatedAt);
  }

  // ── Group + sort entries ─────────────────────────────────────────────────
  // group → component → entries[] (sorted newest first)
  const groupMap = new Map();
  for (const e of entries) {
    if (!groupMap.has(e.group)) groupMap.set(e.group, new Map());
    const compMap = groupMap.get(e.group);
    if (!compMap.has(e.component)) compMap.set(e.component, []);
    compMap.get(e.component).push(e);
  }
  // Sort within each component by generatedAt DESC
  for (const [, compMap] of groupMap) {
    for (const [, arr] of compMap) {
      arr.sort((a, b) => b.generatedAt.localeCompare(a.generatedAt));
    }
  }
  // Sort groups: apps/* first, then libs/*, then other/* — each alpha
  const sortedGroups = [...groupMap.keys()].sort((a, b) => {
    const rank = g => g.startsWith('apps/') ? 0 : g.startsWith('libs/') ? 1 : 2;
    return rank(a) - rank(b) || a.localeCompare(b);
  });

  // ── Render ───────────────────────────────────────────────────────────────
  const container = document.getElementById('groups-container');

  for (const group of sortedGroups) {
    const compMap = groupMap.get(group);
    const [prefix, name] = group.includes('/') ? group.split('/') : ['', group];
    const iconClass = prefix === 'apps' ? 'apps' : prefix === 'libs' ? 'libs' : 'other';
    const totalInGroup = [...compMap.values()].reduce((s, a) => s + a.length, 0);

    const details = document.createElement('details');
    details.className = 'group-section';
    details.open = true;
    details.dataset.group = group;

    const summary = document.createElement('summary');
    summary.className = 'group-summary';
    summary.setAttribute('role', 'button');
    summary.setAttribute('aria-expanded', 'true');
    summary.innerHTML = `
      <span class="group-chevron" aria-hidden="true">▶</span>
      <span class="group-icon ${iconClass}">${prefix || 'other'}</span>
      <span class="group-name">${escHtml(group)}</span>
      <span class="group-count">${compMap.size} component${compMap.size !== 1 ? 's' : ''} · ${totalInGroup} map${totalInGroup !== 1 ? 's' : ''}</span>`;
    details.addEventListener('toggle', () => {
      summary.setAttribute('aria-expanded', details.open ? 'true' : 'false');
    });

    const body = document.createElement('div');
    body.className = 'group-body';

    for (const [comp, arr] of [...compMap.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
      const cluster = document.createElement('div');
      cluster.className = 'component-cluster';
      cluster.dataset.component = comp;
      cluster.dataset.searchText = buildSearchText(arr[0]);

      // Newest (primary) row
      cluster.appendChild(makeEntryRow(arr[0], true));

      if (arr.length > 1) {
        // Version toggle + hidden list
        const toggle = document.createElement('div');
        toggle.className = 'version-toggle';
        toggle.setAttribute('tabindex', '0');
        toggle.setAttribute('role', 'button');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', `Show ${arr.length - 1} older version${arr.length > 2 ? 's' : ''} of ${comp}`);
        toggle.innerHTML = `
          <span class="version-badge">${arr.length - 1} older</span>
          <span class="version-label">version${arr.length > 2 ? 's' : ''}</span>
          <span class="version-chevron" aria-hidden="true">▶</span>`;

        const vList = document.createElement('div');
        vList.className = 'version-list';
        for (let i = 1; i < arr.length; i++) vList.appendChild(makeEntryRow(arr[i], false));

        const toggleVersion = () => {
          const open = vList.classList.toggle('open');
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          toggle.querySelector('.version-chevron').style.transform = open ? 'rotate(90deg)' : '';
        };
        toggle.addEventListener('click', toggleVersion);
        toggle.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleVersion(); } });

        cluster.appendChild(toggle);
        cluster.appendChild(vList);
      }

      body.appendChild(cluster);
    }

    details.appendChild(summary);
    details.appendChild(body);
    container.appendChild(details);
  }

  // ── Legacy section ───────────────────────────────────────────────────────
  if (legacy.length > 0) {
    const legacyContainer = document.getElementById('legacy-container');
    const legacyDetails = document.createElement('details');
    legacyDetails.id = 'legacy-section';

    const legacySummary = document.createElement('summary');
    legacySummary.className = 'legacy-header';
    legacySummary.innerHTML = `
      <span class="group-chevron" aria-hidden="true">▶</span>
      <span class="legacy-icon">legacy</span>
      <span class="legacy-name">No metadata — generated before index support</span>
      <span class="legacy-count">${legacy.length} file${legacy.length !== 1 ? 's' : ''}</span>`;
    legacyDetails.addEventListener('toggle', () => {
      legacySummary.setAttribute('aria-expanded', legacyDetails.open ? 'true' : 'false');
    });

    const legacyBody = document.createElement('div');
    legacyBody.className = 'legacy-body';
    legacyBody.innerHTML = `<p class="legacy-tip">These maps predate automatic index tracking. Re-run <code style="font-family:var(--mono);font-size:10px;color:var(--accent);">/architecture-map</code> on each component to get a versioned, indexed entry.</p>`;

    for (const f of legacy) {
      const row = document.createElement('a');
      row.className = 'legacy-row';
      row.href = f.file;
      row.setAttribute('aria-label', `Open ${f.file}`);
      row.innerHTML = `<span class="entry-name">${escHtml(f.file)}</span><span class="entry-date">${escHtml(f.file)}</span>`;
      legacyBody.appendChild(row);
    }

    legacyDetails.appendChild(legacySummary);
    legacyDetails.appendChild(legacyBody);
    legacyContainer.appendChild(legacyDetails);
  }

  // ── Search ───────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  const matchCount = document.getElementById('match-count');
  const emptyState = document.getElementById('empty-state');
  const emptyQuery = document.getElementById('empty-query');

  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applySearch, 80);
    searchClear.style.display = searchInput.value ? 'block' : 'none';
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.style.display = 'none';
    applySearch();
    searchInput.focus();
  });

  function applySearch() {
    const q = searchInput.value.trim().toLowerCase();
    let visible = 0;

    document.querySelectorAll('.component-cluster').forEach(cluster => {
      const text = cluster.dataset.searchText || '';
      const matches = !q || text.includes(q);
      cluster.classList.toggle('hidden', !matches);
      if (matches) visible++;

      // Highlight matching text in visible rows
      cluster.querySelectorAll('.entry-name, .entry-path').forEach(el => {
        const orig = el.dataset.orig || el.textContent;
        el.dataset.orig = orig;
        el.innerHTML = q ? highlightMatch(orig, q) : escHtml(orig);
      });
    });

    // Show/hide group sections if all their clusters are hidden
    document.querySelectorAll('.group-section').forEach(section => {
      const anyVisible = [...section.querySelectorAll('.component-cluster')].some(c => !c.classList.contains('hidden'));
      section.classList.toggle('hidden', !anyVisible);
    });

    matchCount.textContent = q ? `${visible} result${visible !== 1 ? 's' : ''}` : '';
    const noResults = q && visible === 0;
    emptyState.style.display = noResults ? 'block' : 'none';
    if (noResults) emptyQuery.textContent = `"${q}"`;
  }

  // ── Keyboard: "/" focuses search ─────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.blur();
    }
  });

  // ── Helpers ──────────────────────────────────────────────────────────────
  function makeEntryRow(entry, isPrimary) {
    const a = document.createElement('a');
    a.className = 'entry-row';
    a.href = entry.file;
    a.setAttribute('aria-label', `Open architecture map for ${entry.component}, generated ${relativeTime(entry.generatedAt)}`);

    const absDate = new Date(entry.generatedAt).toLocaleString(undefined, {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    const namePart = isPrimary
      ? `<span class="entry-name" data-orig="${escAttr(entry.component)}">${escHtml(entry.component)}</span>`
      : `<span class="entry-name" data-orig="${escAttr(entry.component)}">${escHtml(entry.component)}</span>`;

    const versionPart = !isPrimary
      ? `<span class="version-badge-inline">${escHtml(tsLabel(entry.generatedAt))}</span>`
      : '';

    a.innerHTML = `
      ${namePart}
      <span class="entry-path" data-orig="${escAttr(entry.entryFile)}">${escHtml(entry.entryFile)}</span>
      <span class="entry-meta">
        ${versionPart}
        <span class="entry-date" title="${escAttr(absDate)}">${relativeTime(entry.generatedAt)}</span>
      </span>`;
    return a;
  }

  function buildSearchText(entry) {
    return [
      entry.component,
      entry.entryFile,
      entry.group,
      entry.issues || ''
    ].join(' ').toLowerCase();
  }

  function relativeTime(iso) {
    if (!iso) return '';
    const ms = Date.now() - new Date(iso).getTime();
    const s = Math.round(ms / 1000);
    if (s < 60) return 'just now';
    const m = Math.round(s / 60);
    if (m < 60) return `${m}m ago`;
    const h = Math.round(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.round(h / 24);
    if (d < 30) return `${d}d ago`;
    const mo = Math.round(d / 30);
    if (mo < 12) return `${mo}mo ago`;
    return `${Math.round(mo / 12)}y ago`;
  }

  function tsLabel(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function highlightMatch(text, q) {
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return escHtml(text);
    return escHtml(text.slice(0, idx)) +
      '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>' +
      highlightMatch(text.slice(idx + q.length), q);
  }
})();
</script>
</body>
</html>
